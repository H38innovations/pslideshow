<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {

  /* ── SLIDES ── */
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
  }
  .slide.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Standard image slide */
  .slide > img.bg {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .slide > video.bg-video {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* Overlay wrapper (for slides 6 + 8) */
  .ov-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;

  .ov-wrap > img.bg {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  /* Overlay elements sit on top, positioned as % of the 16:9 slide */
  .ov {
    position: absolute;
    object-fit: cover;
    pointer-events: none;
  }
  .ov-iframe {
    position: absolute;
    border: none;
    overflow: hidden;
    background: #000;
    z-index: 250;

  .ov-iframe iframe {

  /* ── PROGRESS BAR ── */

    border-radius: 40px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .nb {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .nb:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.6); }

  }

<script>
  var cur = 0;
  var slides = Array.from(document.querySelectorAll('.slide'));
  var total = slides.length;
  var bar = document.getElementById('progress');
  var ctr = document.getElementById('ctr');
  var zp = document.getElementById('zp');
  var zn = document.getElementById('zn');

  function loadSlideAssets(index) {
    var slide = slides[index];
    if (!slide || slide.dataset.assetsLoaded === 'true') return;

    slide.querySelectorAll('img[data-src]').forEach(function(img) {
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
    });

    slide.querySelectorAll('source[data-src]').forEach(function(source) {
      source.src = source.dataset.src;
      source.removeAttribute('data-src');
      if (source.parentElement && typeof source.parentElement.load === 'function') {
        source.parentElement.load();
      }
    });

    slide.dataset.assetsLoaded = 'true';
  }

  function preloadNearbySlides(index) {
    [index, index + 1, index - 1].forEach(function(target) {
      loadSlideAssets(((target % total) + total) % total);
    });
  }

  function warmRemainingSlides() {
    var pending = slides
      .map(function(_, idx) { return idx; })
      .filter(function(idx) { return slides[idx].dataset.assetsLoaded !== 'true'; });

    function step(deadline) {
      while (pending.length && (!deadline || deadline.timeRemaining() > 8)) {
        loadSlideAssets(pending.shift());
      }
      if (pending.length) {
        scheduleIdleWork(step);
      }
    }

    scheduleIdleWork(step);
  }

  function scheduleIdleWork(fn) {
    if ('requestIdleCallback' in window) {
      window.requestIdleCallback(fn, { timeout: 1200 });
    } else {
      window.setTimeout(function() { fn(); }, 180);
    }
  }

  function syncSlideVideos() {
    slides.forEach(function(slide, idx) {
      slide.querySelectorAll('video').forEach(function(v) {
        v.muted = true;
        if (idx === cur) {
          var p = v.play();
          if (p && p.catch) p.catch(function(){});
        } else {
          v.pause();
          try { v.currentTime = 0; } catch (_) {}
        }
      });
    });
  }

  function updateInteractionLayer() {
    var hasInteractive = !!slides[cur].querySelector('.ov-iframe iframe, video, a, button, input, textarea, select');
    var pe = hasInteractive ? 'none' : 'auto';
    zp.style.pointerEvents = pe;
    zn.style.pointerEvents = pe;
  }

  function go(i) {
    slides[cur].classList.remove('active');
    cur = ((i % total) + total) % total;
    preloadNearbySlides(cur);
    slides[cur].classList.add('active');
    ctr.textContent = (cur + 1) + ' / ' + total;
    bar.style.width = ((cur + 1) / total * 100) + '%';
    updateInteractionLayer();
    syncSlideVideos();
  }

  function next() { go(cur + 1); }
  function prev() { go(cur - 1); }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); next(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); prev(); }
  });

  // Touch swipe
  var tx = 0;
  document.addEventListener('touchstart', function(e) {
    tx = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var dx = tx - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) { dx > 0 ? next() : prev(); }
  }, { passive: true });

  preloadNearbySlides(cur);
  warmRemainingSlides();
  updateInteractionLayer();
  syncSlideVideos();
</script>
